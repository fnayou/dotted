version: '3.7'
services:
    # nginx
    nginx:
        image: nginx
        ports:
            - "8084:80"
        volumes:
            - ./docker/nginx/nginx.conf:/nginx.conf
            - ./docker/logs/nginx:/var/log/nginx
            - ./:/var/www/html
        depends_on:
            - php
        command: nginx -c /nginx.conf
        networks:
            network:
                ipv4_address: 172.13.10.10
    # php
    php:
        build:
            context: docker/php
        ports:
            - 9003
        volumes:
            - ./docker/bash/bash_profile:/root/.bash_profile
            - ./docker/bash/bashrc:/root/.bashrc
            - ./docker/bash/bash_aliases:/root/.bash_aliases
            - ./:/var/www/html
        working_dir: /var/www/html
        networks:
            network:
                ipv4_address: 172.13.10.11
networks:
    network:
        ipam:
            driver: default
            config:
                - subnet: "172.13.10.0/24"
